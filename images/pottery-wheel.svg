<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-labelledby="pw-title">
  <title id="pw-title">Pottery wheel with vessel</title>
  <defs>
    <linearGradient id="pw-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6f2e8"/>
      <stop offset="100%" stop-color="#e8d7c3"/>
    </linearGradient>
    <linearGradient id="pw-clay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ba7446"/>
      <stop offset="50%" stop-color="#9c5f3a"/>
      <stop offset="100%" stop-color="#8b4f30"/>
    </linearGradient>
    <radialGradient id="pw-disc" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#9e8e7d"/>
      <stop offset="70%" stop-color="#7a6b5c"/>
      <stop offset="100%" stop-color="#5e5044"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" rx="24" fill="url(#pw-bg)"/>
  <!-- Decorative circles -->
  <circle cx="60" cy="60" r="80" fill="#5f8d92" opacity="0.06"/>
  <circle cx="340" cy="340" r="60" fill="#e8ba76" opacity="0.08"/>
  <!-- Wheel base -->
  <rect x="155" y="290" width="90" height="50" rx="6" fill="#5e5044" opacity="0.7"/>
  <rect x="170" y="260" width="60" height="35" rx="4" fill="#6b5d50" opacity="0.6"/>
  <!-- Wheel disc -->
  <ellipse cx="200" cy="260" rx="95" ry="28" fill="url(#pw-disc)"/>
  <ellipse cx="200" cy="257" rx="80" ry="22" fill="#8a7b6a" opacity="0.5"/>
  <!-- Concentric rings on wheel -->
  <ellipse cx="200" cy="257" rx="60" ry="16" fill="none" stroke="#9e8e7d" stroke-width="1" opacity="0.5"/>
  <ellipse cx="200" cy="257" rx="40" ry="11" fill="none" stroke="#9e8e7d" stroke-width="1" opacity="0.4"/>
  <!-- Vessel being formed -->
  <path d="M172 230 Q168 180 175 145 Q180 125 200 120 Q220 125 225 145 Q232 180 228 230Z" fill="url(#pw-clay)"/>
  <ellipse cx="200" cy="230" rx="28" ry="8" fill="#ba7446"/>
  <ellipse cx="200" cy="120" rx="18" ry="5" fill="#c4916a"/>
  <!-- Interior shadow of vessel -->
  <ellipse cx="200" cy="122" rx="12" ry="3.5" fill="#8b4f30" opacity="0.5"/>
  <!-- Clay texture rings -->
  <path d="M175 160 Q200 155 225 160" fill="none" stroke="#a06840" stroke-width="1.2" opacity="0.4"/>
  <path d="M174 180 Q200 175 226 180" fill="none" stroke="#a06840" stroke-width="1.2" opacity="0.35"/>
  <path d="M173 200 Q200 195 227 200" fill="none" stroke="#a06840" stroke-width="1.2" opacity="0.3"/>
  <path d="M173 215 Q200 210 227 215" fill="none" stroke="#a06840" stroke-width="1.2" opacity="0.25"/>
  <!-- Water bowl -->
  <ellipse cx="320" cy="280" rx="30" ry="10" fill="#5f8d92" opacity="0.25"/>
  <ellipse cx="320" cy="278" rx="26" ry="8" fill="#5f8d92" opacity="0.15"/>
  <!-- Sponge -->
  <rect x="80" y="270" width="22" height="16" rx="6" fill="#e8ba76" opacity="0.4"/>
  <!-- Splash marks -->
  <circle cx="140" cy="250" r="3" fill="#c4a882" opacity="0.25"/>
  <circle cx="265" cy="245" r="2" fill="#c4a882" opacity="0.2"/>
  <circle cx="115" cy="275" r="4" fill="#ba7446" opacity="0.15"/>
</svg>