<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" role="img" aria-labelledby="as-title">
  <title id="as-title">Community studio scene</title>
  <defs>
    <linearGradient id="as-bg" x1="0" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#f6f2e8"/>
      <stop offset="50%" stop-color="#ece0d0"/>
      <stop offset="100%" stop-color="#e8d7c3"/>
    </linearGradient>
    <linearGradient id="as-table" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a7b6a"/>
      <stop offset="100%" stop-color="#6b5d50"/>
    </linearGradient>
  </defs>
  <rect width="480" height="360" rx="20" fill="url(#as-bg)"/>
  <!-- Warm background circles -->
  <circle cx="80" cy="80" r="100" fill="#e8ba76" opacity="0.07"/>
  <circle cx="400" cy="280" r="80" fill="#5f8d92" opacity="0.06"/>
  <circle cx="240" cy="60" r="60" fill="#ba7446" opacity="0.05"/>
  <!-- Window -->
  <rect x="30" y="30" width="120" height="100" rx="10" fill="#275155" opacity="0.12"/>
  <rect x="36" y="36" width="108" height="88" rx="6" fill="#5f8d92" opacity="0.2"/>
  <line x1="90" y1="36" x2="90" y2="124" stroke="#f6f2e8" stroke-width="3" opacity="0.5"/>
  <line x1="36" y1="80" x2="144" y2="80" stroke="#f6f2e8" stroke-width="3" opacity="0.5"/>
  <!-- Work table -->
  <rect x="40" y="200" width="400" height="16" rx="4" fill="url(#as-table)"/>
  <rect x="60" y="216" width="12" height="100" rx="3" fill="#6b5d50" opacity="0.6"/>
  <rect x="408" y="216" width="12" height="100" rx="3" fill="#6b5d50" opacity="0.6"/>
  <!-- Person 1 (abstract) -->
  <circle cx="140" cy="155" r="18" fill="#d7b18c" opacity="0.5"/>
  <rect x="125" y="170" width="30" height="35" rx="8" fill="#5f8d92" opacity="0.4"/>
  <!-- Person 1 arms -->
  <path d="M130 185 Q120 195 125 200" stroke="#d7b18c" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.4"/>
  <path d="M150 185 Q160 195 155 200" stroke="#d7b18c" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.4"/>
  <!-- Person 2 (abstract) -->
  <circle cx="260" cy="150" r="20" fill="#d7b18c" opacity="0.5"/>
  <rect x="243" y="167" width="34" height="38" rx="9" fill="#ba7446" opacity="0.35"/>
  <!-- Person 2 arms -->
  <path d="M248 183 Q235 193 240 200" stroke="#d7b18c" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.4"/>
  <path d="M272 183 Q285 193 280 200" stroke="#d7b18c" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.4"/>
  <!-- Person 3 (abstract) -->
  <circle cx="370" cy="155" r="17" fill="#d7b18c" opacity="0.5"/>
  <rect x="356" y="169" width="28" height="35" rx="7" fill="#275155" opacity="0.35"/>
  <!-- Pottery on table -->
  <rect x="105" y="185" width="24" height="18" rx="10" fill="#ba7446" opacity="0.6"/>
  <rect x="225" y="182" width="30" height="22" rx="12" fill="#8b4f30" opacity="0.55"/>
  <ellipse cx="240" cy="182" rx="15" ry="4" fill="#a06840" opacity="0.5"/>
  <rect x="340" y="186" width="20" height="16" rx="8" fill="#c4a882" opacity="0.6"/>
  <!-- Tools hanging on wall -->
  <line x1="200" y1="50" x2="200" y2="110" stroke="#8a7b6a" stroke-width="3" stroke-linecap="round" opacity="0.25"/>
  <line x1="220" y1="55" x2="220" y2="105" stroke="#8a7b6a" stroke-width="3" stroke-linecap="round" opacity="0.2"/>
  <line x1="240" y1="48" x2="240" y2="108" stroke="#8a7b6a" stroke-width="3" stroke-linecap="round" opacity="0.22"/>
  <!-- Small bowl on wall shelf -->
  <rect x="310" y="60" width="80" height="6" rx="3" fill="#6b5d50" opacity="0.3"/>
  <rect x="325" y="45" width="18" height="18" rx="8" fill="#ba7446" opacity="0.35"/>
  <rect x="355" y="48" width="14" height="15" rx="6" fill="#5f8d92" opacity="0.3"/>
</svg>