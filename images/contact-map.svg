<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 280" role="img" aria-labelledby="cm-title">
  <title id="cm-title">Yachats, Oregon coast location</title>
  <defs>
    <linearGradient id="cm-ocean" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5f8d92"/>
      <stop offset="100%" stop-color="#275155"/>
    </linearGradient>
    <linearGradient id="cm-land" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c4a882"/>
      <stop offset="40%" stop-color="#d7c4a8"/>
      <stop offset="100%" stop-color="#e8d7c3"/>
    </linearGradient>
    <radialGradient id="cm-pin" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#e8ba76"/>
      <stop offset="100%" stop-color="#ba7446"/>
    </radialGradient>
  </defs>
  <rect width="480" height="280" rx="16" fill="url(#cm-ocean)"/>
  <!-- Ocean texture -->
  <path d="M0 80 Q60 70 120 80 Q180 90 240 80 Q300 70 360 80 Q420 90 480 80" fill="none" stroke="#4a7a7f" stroke-width="1.5" opacity="0.3"/>
  <path d="M0 110 Q80 100 160 110 Q240 120 320 110 Q400 100 480 110" fill="none" stroke="#4a7a7f" stroke-width="1.5" opacity="0.25"/>
  <path d="M0 140 Q70 130 140 140 Q210 150 280 140 Q350 130 420 140 Q450 145 480 140" fill="none" stroke="#4a7a7f" stroke-width="1.5" opacity="0.2"/>
  <!-- Oregon coastline (right side = land) -->
  <path d="M300 0 Q280 30 290 60 Q295 80 285 110 Q275 130 280 160 Q290 190 275 220 Q270 250 280 280 L480 280 L480 0Z" fill="url(#cm-land)"/>
  <!-- Coast detail -->
  <path d="M300 0 Q278 35 290 65 Q298 82 287 112 Q274 132 282 165 Q292 192 276 222 Q268 252 280 280" fill="none" stroke="#a8956e" stroke-width="2" opacity="0.4"/>
  <!-- Trees along coast -->
  <circle cx="320" cy="50" r="8" fill="#3a6b4a" opacity="0.3"/>
  <circle cx="310" cy="90" r="10" fill="#3a6b4a" opacity="0.25"/>
  <circle cx="305" cy="140" r="7" fill="#3a6b4a" opacity="0.3"/>
  <circle cx="315" cy="200" r="9" fill="#3a6b4a" opacity="0.25"/>
  <!-- Roads -->
  <path d="M340 0 L340 280" stroke="#b8a68e" stroke-width="3" opacity="0.3"/>
  <path d="M340 130 L430 130" stroke="#b8a68e" stroke-width="2" opacity="0.25"/>
  <!-- Location pin -->
  <g transform="translate(340, 120)">
    <ellipse cx="0" cy="28" rx="12" ry="4" fill="#1f353a" opacity="0.25"/>
    <path d="M0 -20 Q-14 -20 -14 -6 Q-14 6 0 22 Q14 6 14 -6 Q14 -20 0 -20Z" fill="url(#cm-pin)"/>
    <circle cx="0" cy="-6" r="5" fill="#fffcf6" opacity="0.7"/>
  </g>
  <!-- Label -->
  <rect x="355" y="98" width="90" height="26" rx="6" fill="#fffcf6" opacity="0.9"/>
  <text x="400" y="116" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#1f353a">Yachats, OR</text>
  <!-- Compass rose -->
  <g transform="translate(60, 220)" opacity="0.35">
    <circle cx="0" cy="0" r="22" fill="#fffcf6" opacity="0.2" stroke="#fffcf6" stroke-width="1"/>
    <line x1="0" y1="-18" x2="0" y2="18" stroke="#fffcf6" stroke-width="1.5"/>
    <line x1="-18" y1="0" x2="18" y2="0" stroke="#fffcf6" stroke-width="1.5"/>
    <text x="0" y="-22" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="700" fill="#fffcf6">N</text>
  </g>
</svg>